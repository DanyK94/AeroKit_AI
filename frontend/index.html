<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroDoc Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>✈️ AeroDoc Chat</h1>
            <p>Ask questions about aviation technical manuals</p>
        </header>

        <!-- Documents Table -->
        <div class="documents-table">
            <table id="documentsTable">
                <thead><tr>
                    <th>X</th>
                    <th>UUID</th>
                    <th>Document Name</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody id="documentsBody"></tbody>
            </table>

            <div class="lowerbar">
                <button type="button" id="deleteBtn" onclick="deleteDocuments()">Delete Documents</button>
                <button type="button" id="startChat">Start Chat</button>
                <button type="button" id="delAllBtn" onclick="deleteAllDocs()">Delete All [DEV]</button>   
                
                <div class="upload-section">
                    <input type="file" id="pdfFile" accept=".pdf">
                    <button onclick="uploadPDF()" id="uploadBtn">Upload Manual</button>
                    <div id="uploadStatus"></div>
                </div>           
            </div>
        </div>


        <!-- Upload Section -->


        <!-- Current Document Info -->
        <div id="docInfo" class="doc-info" style="display:none;">
            <strong>Current Document:</strong> <span id="docName"></span> 
            (<span id="docChunks"></span> chunks)
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div id="messages" class="messages"></div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <input 
                type="text" 
                id="queryInput" 
                placeholder="Ask a question about the manual..."
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="sendQuery()" id="sendBtn">Send</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
